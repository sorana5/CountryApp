name: CI - Project

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  country-service:
    name: Country Service Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: country
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}

      - name: Run tests
        run: mvn test --no-transfer-progress
        env:
          DB_USERNAME: postgres
          DB_PASSWORD: password
          MAIL_USERNAME: test@test.com
          MAIL_PASSWORD: testpassword

  user-service:
    name: User Service Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: user
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}

      - name: Run tests
        run: mvn test --no-transfer-progress
        env:
          DB_USERNAME: postgres
          DB_PASSWORD: password

  notification-service:
    name: Notification Service Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: notification
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}

      - name: Run tests
        run: mvn test --no-transfer-progress
        env:
          MAIL_USERNAME: test@test.com
          MAIL_PASSWORD: testpassword
